name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --workspace --exclude smux-app
      - run: cargo test --workspace --exclude smux-app
      - run: cargo fmt --check
      - run: cargo clippy --workspace --exclude smux-app --all-targets -- -D warnings
